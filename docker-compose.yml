# Local dev with: docker compose up --build
# Coolify uses the Dockerfile directly; this file is only for local testing.
services:
  orchestrator:
    build: .
    container_name: geotiff-orchestrator
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
